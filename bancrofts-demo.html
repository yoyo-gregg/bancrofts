<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bancroft's School</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">

<!--
  PP Writer is a licensed typeface — load it from your own hosted copy
  if you have the files. The @font-face block below expects pp-writer-book.woff2
  and pp-writer-book.woff to be in the same folder as this HTML file.
  If not present, Cormorant Garamond is used as a close fallback.
-->
<style>
  @font-face {
    font-family: 'PP Writer';
    src: url('pp-writer-book.woff2') format('woff2'),
         url('pp-writer-book.woff') format('woff');
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #f5f5f5;
    display: flex;
    justify-content: center;
    align-items: flex-start;
  }

  /*
    Locked to 375px — the Figma artboard width.
    All pixel positions are relative to this container.
  */
  .phone-wrapper {
    width: 375px;
    flex-shrink: 0;
    height: 100vh;
    position: relative;
    overflow: hidden;
    background: #f5f5f5;
  }

  .phone-wrapper.video-active {
    background: #000;
  }

  /* ─────────────────────────────
     INTRO SCREEN
  ───────────────────────────── */
  #intro {
    position: absolute;
    inset: 0;
    z-index: 100;
    background: #f5f5f5;
    transition: opacity 0.6s ease;
  }

  #intro.fade-out {
    opacity: 0;
    pointer-events: none;
  }

  /* Logo — top 50px, centred */
  .intro-logo {
    position: absolute;
    width: 120px;
    height: 32px;
    left: 50%;
    top: 50px;
    transform: translateX(-50%);
    object-fit: contain;
    opacity: 0;
    animation: iLogoIn 0.9s ease 0.3s forwards;
  }

  /*
    Statement — vertically centred slightly above middle.
    PP Writer with Cormorant Garamond fallback.
    Size matches Figma screenshot — 32px gives the weight shown in image 1.
  */
  .intro-statement {
    position: absolute;
    left: 50%;
    top: calc(50% - 75px);
    transform: translateX(-50%);
    font-family: 'PP Writer', 'Cormorant Garamond', Georgia, serif;
    font-weight: 400;
    font-size: 32px;
    line-height: 1.2;
    color: #2c4255;
    text-align: center;
    white-space: nowrap;
    opacity: 0;
    animation: iStatIn 1s ease 0.6s forwards;
  }

  /* Gold divider — calc(50% + 15px) */
  .intro-line {
    position: absolute;
    left: 50%;
    top: calc(50% + 15px);
    width: 180px;
    height: 1px;
    transform: translateX(-50%) translateY(-50%) scaleX(0);
    background: #c8a96e;
    transform-origin: center;
    animation: iLineIn 0.8s ease 1.2s forwards;
  }

  /* Subtitle — calc(50% + 55px) */
  .intro-sub {
    position: absolute;
    left: 50%;
    top: calc(50% + 55px);
    width: 235px;
    transform: translateX(-50%);
    font-family: 'PP Writer', 'EB Garamond', Georgia, serif;
    font-size: 11px;
    letter-spacing: 0.18em;
    color: #2c4255;
    text-align: center;
    text-transform: uppercase;
    opacity: 0;
    animation: iFadeIn 0.8s ease 1.4s forwards;
  }

  /* CTA — bottom 130px */
  .intro-cta {
    position: absolute;
    left: 50%;
    bottom: 130px;
    transform: translateX(-50%);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: #2c4255;
    border: 2px solid rgba(44,66,85,0.5);
    box-shadow: 0 0 0 3px rgba(44,66,85,0.18);
    padding: 10px 24px;
    cursor: pointer;
    white-space: nowrap;
    font-family: 'PP Writer', 'EB Garamond', Georgia, serif;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: #f5f5f5;
    text-transform: uppercase;
    line-height: 1;
    min-width: 220px;
    text-align: center;
    opacity: 0;
    animation: iFadeIn 0.8s ease 1.8s forwards;
    transition: background 0.2s ease;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  .intro-cta:hover  { background: #1e2f3d; }
  .intro-cta:active { background: #161f28; }

  @keyframes iLogoIn {
    from { opacity: 0; transform: translateX(-50%) translateY(8px); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0); }
  }
  @keyframes iStatIn {
    from { opacity: 0; transform: translateX(-50%) translateY(10px); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0); }
  }
  @keyframes iLineIn {
    from { transform: translateX(-50%) translateY(-50%) scaleX(0); opacity: 0; }
    to   { transform: translateX(-50%) translateY(-50%) scaleX(1); opacity: 1; }
  }
  @keyframes iFadeIn {
    to { opacity: 1; }
  }

  /* ─────────────────────────────
     VIDEO
     object-position locked to top-left so the crop matches
     the Figma artboard exactly — hotspot px coords stay accurate.
  ───────────────────────────── */
  #map-video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    z-index: 1;
    opacity: 0;
    transition: opacity 0.6s ease;
  }

  #map-video.visible { opacity: 1; }

  /* ─────────────────────────────
     UI OVERLAY
  ───────────────────────────── */
  #ui-overlay {
    position: absolute;
    inset: 0;
    z-index: 10;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s ease;
  }

  #ui-overlay.visible {
    opacity: 1;
    pointer-events: auto;
  }

  .grad-top {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 459px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.8), rgba(0,0,0,0));
    pointer-events: none;
  }

  .grad-bottom {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 190px;
    background: linear-gradient(to top, rgba(0,0,0,0.8), rgba(0,0,0,0));
    pointer-events: none;
  }

  .clouds {
    position: absolute;
    width: 836px;
    height: 492px;
    left: -22px;
    top: -8px;
    transform: rotate(-16.94deg);
    opacity: 0.35;
    pointer-events: none;
  }

  /* Nav — top 60px from Figma */
  nav {
    position: absolute;
    top: 60px;
    left: 0; right: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
  }

  .nav-link {
    font-family: 'PP Writer', 'EB Garamond', Georgia, serif;
    font-size: 11px;
    letter-spacing: 0.16em;
    color: #f5f5f5;
    text-transform: uppercase;
    cursor: pointer;
    min-width: 48px;
  }

  .nav-link:last-child { text-align: right; }

  .nav-logo-wrap {
    position: absolute;
    left: 50%;
    top: -16px;
    transform: translateX(-50%);
  }

  .nav-logo {
    width: 120px;
    height: 32px;
    object-fit: contain;
    display: block;
  }

  /*
    Hotspots — pixel positions based on Figma 375px artboard.
    margin: -10px -10px centres each 20px dot on its coordinate.
    Only hs-2 (Visit Us) is interactive — others are display only.
  */
  .hotspot {
    position: absolute;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: rgba(245,245,245,0.9);
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: pulse 2.5s ease-in-out infinite;
    margin-left: -10px;
    margin-top: -10px;
  }

  .hotspot::before {
    content: '';
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #c8a96e;
    flex-shrink: 0;
  }

  /* Only Visit Us hotspot is tappable */
  .hotspot.interactive {
    cursor: pointer;
    transition: transform 0.2s ease, background 0.2s ease;
    -webkit-tap-highlight-color: transparent;
  }

  .hotspot.interactive:hover,
  .hotspot.interactive.active {
    background: #fff;
    animation: none;
    box-shadow: 0 0 0 4px rgba(255,255,255,0.25);
    transform: scale(1.3);
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(245,245,245,0.4); }
    50%       { box-shadow: 0 0 0 6px rgba(245,245,245,0); }
  }

  /*
    Pixel positions from Figma artboard (375px wide).
    Calculated as: left = percentage * 375 + offset
    hs-1: calc(66.67% - 4px)  = 246px,  top 296px
    hs-2: calc(87.5%  - 17px) = 311px,  top 568px  ← Visit Us
    hs-3: calc(20.83% + 6px)  = 84px,   top 555px
    hs-4: calc(29.17% - 3px)  = 106px,  top 406px
  */
  .hs-1 { left: 246px; top: 296px; }
  .hs-2 { left: 311px; top: 568px; }
  .hs-3 { left: 84px;  top: 555px; }
  .hs-4 { left: 106px; top: 406px; }

  /*
    Visit Us CTA — shown on tap of hs-2.
    Position: left calc(70.83% - 8px) = 258px, -translateX(50%), top 566px
  */
  .visit-cta {
    position: absolute;
    left: 258px;
    top: 566px;
    transform: translateX(-50%);
    z-index: 10;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: #f5f5f5;
    border: 2px solid rgba(245,245,245,0.5);
    padding: 6px 12px;
    cursor: pointer;
    transition: background 0.2s ease;
    -webkit-tap-highlight-color: transparent;
    /* Hidden until hotspot tapped — always visible per Figma */
  }

  .visit-cta:hover { background: #fff; }

  .visit-cta span {
    font-family: 'PP Writer', 'EB Garamond', Georgia, serif;
    font-size: 11px;
    letter-spacing: 0.16em;
    color: #2c4255;
    text-transform: uppercase;
    white-space: nowrap;
    line-height: 1;
  }

  /* Map guide — centred, bottom 73px */
  .map-guide {
    position: absolute;
    left: 50%;
    bottom: 73px;
    transform: translateX(-50%);
    width: 281px;
    height: 50px;
    object-fit: contain;
    z-index: 10;
    opacity: 0.85;
  }
</style>
</head>
<body>
<div class="phone-wrapper">

  <!-- VIDEO — stays on last frame permanently -->
  <video id="map-video" playsinline muted preload="auto">
    <source src="Mobile-Map.mp4" type="video/mp4">
  </video>

  <!-- UI OVERLAY — fades in over frozen video -->
  <div id="ui-overlay">
    <div class="grad-top"></div>
    <div class="grad-bottom"></div>
    <img class="clouds"
      src="https://www.figma.com/api/mcp/asset/e6620b7d-c03f-4282-9c01-29466aca518c"
      alt="">

    <nav>
      <span class="nav-link">Contact</span>
      <div class="nav-logo-wrap">
        <img class="nav-logo"
          src="https://www.figma.com/api/mcp/asset/ea6a9896-5c44-4218-833f-20a934a99403"
          alt="Bancroft's School">
      </div>
      <span class="nav-link">Menu</span>
    </nav>

    <!-- hs-1, hs-3, hs-4 — display only, no interaction -->
    <div class="hotspot hs-1"></div>
    <div class="hotspot hs-3"></div>
    <div class="hotspot hs-4"></div>

    <!-- hs-2 — Visit Us, interactive only -->
    <div class="hotspot hs-2 interactive" id="visitHotspot"></div>

    <!-- Visit Us CTA — always visible per Figma design -->
    <div class="visit-cta" id="visitCta">
      <span>Visit us</span>
    </div>

    <!-- Map guide -->
    <img class="map-guide"
      src="https://www.figma.com/api/mcp/asset/1e85b987-678c-40af-9d4b-2b52b4c2b114"
      alt="Map guide">
  </div>

  <!-- INTRO SCREEN — on top of everything -->
  <div id="intro">
    <img class="intro-logo"
      src="https://www.figma.com/api/mcp/asset/9e2f44a7-7853-492a-8729-1ac7ab8b0aef"
      alt="Bancroft's School">
    <p class="intro-statement">Where London ends,<br>something greater begins.</p>
    <div class="intro-line"></div>
    <p class="intro-sub">Woodford Green Est &bull; 1737</p>
    <div class="intro-cta" id="enterBtn">Explore the school</div>
  </div>

</div>

<script>
  const intro        = document.getElementById('intro');
  const mapVideo     = document.getElementById('map-video');
  const uiOverlay    = document.getElementById('ui-overlay');
  const enterBtn     = document.getElementById('enterBtn');
  const wrapper      = document.querySelector('.phone-wrapper');
  const visitHotspot = document.getElementById('visitHotspot');
  const visitCta     = document.getElementById('visitCta');

  mapVideo.load();

  function startSequence() {
    enterBtn.style.pointerEvents = 'none';
    intro.classList.add('fade-out');

    setTimeout(() => {
      mapVideo.play().catch(() => {});
      mapVideo.classList.add('visible');

      setTimeout(() => {
        wrapper.classList.add('video-active');
        intro.style.display = 'none';
      }, 650);
    }, 400);

    mapVideo.addEventListener('ended', () => {
      uiOverlay.classList.add('visible');
    }, { once: true });
  }

  enterBtn.addEventListener('click', startSequence);
  enterBtn.addEventListener('touchend', (e) => { e.preventDefault(); startSequence(); });

  // Visit Us hotspot — toggles active state on the hotspot only
  visitHotspot.addEventListener('click', (e) => {
    e.stopPropagation();
    visitHotspot.classList.toggle('active');
  });

  // Tap background to deactivate
  uiOverlay.addEventListener('click', () => {
    visitHotspot.classList.remove('active');
  });
</script>
</body>
</html>
